<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 정부 예산 3D 지도</title>
    <meta property="og:title" content="2026년 정부예산안 3D 지도">
    <meta property="og:description" content="2026년 정부예산안 624.8조원, 61개 부처 2,275개 세부사업을 3D 빌딩으로 시각화한 인터랙티브 지도">
    <meta property="og:image" content="https://danue1.github.io/fiscal-budget-2026/og-image.png">
    <meta property="og:url" content="https://danue1.github.io/fiscal-budget-2026/map3d.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="2026년 정부예산안 3D 지도">
    <meta name="twitter:description" content="2026년 정부예산안 624.8조원, 61개 부처 2,275개 세부사업을 3D 빌딩으로 시각화">
    <meta name="twitter:image" content="https://danue1.github.io/fiscal-budget-2026/og-image.png">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Noto Sans KR',sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden;height:100vh;}
        #canvas-container{width:100vw;height:100vh;}
        canvas{display:block;}

        #header{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(13,17,23,.94);border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;backdrop-filter:blur(8px);}
        .logo{display:flex;align-items:center;gap:10px;}
        .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#1d4ed8,#059669);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
        .logo-text{font-size:14px;font-weight:700;color:#e6edf3;}
        .logo-sub{font-size:10px;color:#8b949e;margin-top:1px;}
        .hstats{display:flex;gap:22px;align-items:center;}
        .hstat{text-align:right;}
        .hstat-val{font-size:15px;font-weight:700;color:#58a6ff;}
        .hstat-label{font-size:10px;color:#8b949e;}
        .back-btn{padding:6px 14px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:12px;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .2s;}
        .back-btn:hover{background:#30363d;}

        #legend{position:fixed;left:16px;top:70px;background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:12px;padding:14px 12px;z-index:100;backdrop-filter:blur(8px);max-height:calc(100vh - 86px);overflow-y:auto;width:196px;}
        #legend h3{font-size:10px;font-weight:700;color:#8b949e;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
        .legend-item{display:flex;align-items:center;gap:7px;padding:3px 0;cursor:pointer;transition:opacity .15s;}
        .legend-item:hover{opacity:.75;}
        .legend-item.hidden{opacity:.28;}
        .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
        .legend-name{font-size:11px;color:#c9d1d9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .legend-meta{font-size:10px;color:#6e7681;white-space:nowrap;}

        #controls{position:fixed;right:16px;top:70px;background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:12px;padding:14px;z-index:100;backdrop-filter:blur(8px);width:210px;}
        #controls h3{font-size:10px;font-weight:700;color:#8b949e;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
        .ctrl-row{display:flex;gap:6px;margin-bottom:7px;}
        .ctrl-btn{flex:1;padding:6px 8px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center;}
        .ctrl-btn:hover{background:#30363d;}
        .ctrl-btn.active{background:#1d4ed8;border-color:#3b82f6;color:#fff;}
        .scale-box{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px;margin-top:8px;}
        .scale-title{font-size:10px;color:#8b949e;margin-bottom:7px;font-weight:600;}
        .scale-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
        .scale-block{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:2px;}
        .scale-label{font-size:10px;color:#8b949e;}

        #tooltip{position:fixed;background:rgba(13,17,23,.97);border:1px solid #30363d;border-radius:10px;padding:13px;z-index:200;pointer-events:none;display:none;max-width:260px;backdrop-filter:blur(8px);}
        .tt-name{font-size:12px;font-weight:700;color:#e6edf3;margin-bottom:5px;line-height:1.3;}
        .tt-budget{font-size:15px;font-weight:700;color:#3fb950;margin:5px 0 3px;}
        .tt-row{display:flex;justify-content:space-between;font-size:11px;color:#8b949e;padding:1px 0;}
        .tt-val{color:#58a6ff;font-weight:600;}
        .tt-floor{font-size:10px;color:#6e7681;margin-top:5px;border-top:1px solid #21262d;padding-top:5px;}

        #info-panel{position:fixed;right:16px;bottom:16px;background:rgba(13,17,23,.97);border:1px solid #30363d;border-radius:12px;padding:16px;z-index:100;backdrop-filter:blur(8px);width:280px;display:none;}
        .ip-close{position:absolute;top:10px;right:12px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:16px;line-height:1;}
        .ip-title{font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:6px;line-height:1.3;padding-right:20px;}
        .ip-budget{font-size:18px;font-weight:700;color:#3fb950;margin:6px 0 4px;}
        .ip-row{font-size:11px;color:#8b949e;padding:2px 0;display:flex;justify-content:space-between;}
        .ip-val{color:#c9d1d9;}
        .ip-floors{margin-top:8px;max-height:200px;overflow-y:auto;}
        .ip-floor-item{display:flex;align-items:center;gap:6px;font-size:10px;padding:3px 0;border-bottom:1px solid #21262d;}
        .ip-floor-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
        .ip-floor-name{color:#8b949e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .ip-floor-bud{color:#58a6ff;font-weight:600;white-space:nowrap;}

        #loading{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
        .ld-spinner{width:48px;height:48px;border:3px solid #21262d;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .ld-text{color:#8b949e;font-size:14px;}
        #help{position:fixed;bottom:16px;left:16px;font-size:10px;color:#484f58;z-index:100;line-height:2;}
    </style>
</head>
<body>
    <div id="loading">
        <div class="ld-spinner"></div>
        <div class="ld-text">3D 지도 로딩 중...</div>
    </div>

    <div id="canvas-container"></div>

    <div id="header">
        <div class="logo">
            <div class="logo-icon">🗺</div>
            <div>
                <div class="logo-text">2026년 정부 예산 3D 지도</div>
                <div class="logo-sub">건물높이 ∝ log(예산) · 각 층 = 세부사업 · 색상 = 분야</div>
            </div>
        </div>
        <div class="hstats">
            <div class="hstat"><div class="hstat-val" id="h-budget">-</div><div class="hstat-label">총예산 (조원)</div></div>
            <div class="hstat"><div class="hstat-val" id="h-field">16</div><div class="hstat-label">분야</div></div>
            <div class="hstat"><div class="hstat-val" id="h-bldg">-</div><div class="hstat-label">단위사업</div></div>
            <div class="hstat"><div class="hstat-val" id="h-sub">-</div><div class="hstat-label">세부사업</div></div>
            <a href="index.html" class="back-btn">← 대시보드</a>
        </div>
    </div>

    <div id="legend">
        <h3>분야 범례</h3>
        <div id="legend-list"></div>
    </div>

    <div id="controls">
        <h3>표시 옵션</h3>
        <div class="ctrl-row">
            <button class="ctrl-btn active" id="btn-labels" onclick="toggleLabels()">라벨</button>
            <button class="ctrl-btn active" id="btn-rings" onclick="toggleRings()">구역</button>
        </div>
        <div class="ctrl-row">
            <button class="ctrl-btn" onclick="resetCamera()">카메라 초기화</button>
        </div>
        <div class="scale-box">
            <div class="scale-title">건물 높이 스케일 (log)</div>
            <div class="scale-row"><div class="scale-block" style="width:6px;height:12px"></div><div class="scale-label">~100억원</div></div>
            <div class="scale-row"><div class="scale-block" style="width:6px;height:30px"></div><div class="scale-label">~1,000억원</div></div>
            <div class="scale-row"><div class="scale-block" style="width:6px;height:60px"></div><div class="scale-label">~1조원</div></div>
            <div class="scale-row"><div class="scale-block" style="width:6px;height:100px"></div><div class="scale-label">~10조원 이상</div></div>
        </div>
    </div>

    <div id="tooltip"></div>

    <div id="info-panel">
        <button class="ip-close" onclick="closeInfo()">✕</button>
        <div id="ip-content"></div>
    </div>

    <div id="help">
        드래그: 회전 &nbsp;|&nbsp; 우클릭+드래그: 이동 &nbsp;|&nbsp; 스크롤: 확대/축소 &nbsp;|&nbsp; 클릭: 상세 정보
    </div>

    <script>
    // ══════════════════════════════
    // 상수
    // ══════════════════════════════
    const FIELD_COLORS_INT = {
        '일반·지방행정':0x4f46e5,'공공질서및안전':0xdc2626,'통일·외교':0x0891b2,
        '국방':0x4b5563,'교육':0x2563eb,'문화및관광':0xdb2777,'환경':0x059669,
        '사회복지':0x7c3aed,'보건':0xea580c,'농림수산':0x65a30d,
        '산업·중소기업및에너지':0xd97706,'교통및물류':0x0d9488,'통신':0x9333ea,
        '국토및지역개발':0x1d4ed8,'과학기술':0x10b981,'예비비':0x6b7280
    };
    const FIELD_COLORS_HEX = {
        '일반·지방행정':'#4f46e5','공공질서및안전':'#dc2626','통일·외교':'#0891b2',
        '국방':'#4b5563','교육':'#2563eb','문화및관광':'#db2777','환경':'#059669',
        '사회복지':'#7c3aed','보건':'#ea580c','농림수산':'#65a30d',
        '산업·중소기업및에너지':'#d97706','교통및물류':'#0d9488','통신':'#9333ea',
        '국토및지역개발':'#1d4ed8','과학기술':'#10b981','예비비':'#6b7280'
    };
    // 세부사업 층별 색상 팔레트
    const FLOOR_PALETTE_INT = [
        0x3b82f6,0xf59e0b,0x10b981,0xef4444,0xa855f7,
        0xf97316,0x06b6d4,0xec4899,0x84cc16,0x6366f1,
        0xfbbf24,0x34d399,0xc084fc,0xfb923c,0x22d3ee,
        0xf472b6,0xa3e635,0x60a5fa,0xfda4af,0x86efac
    ];
    const FLOOR_PALETTE_HEX = [
        '#3b82f6','#f59e0b','#10b981','#ef4444','#a855f7',
        '#f97316','#06b6d4','#ec4899','#84cc16','#6366f1',
        '#fbbf24','#34d399','#c084fc','#fb923c','#22d3ee',
        '#f472b6','#a3e635','#60a5fa','#fda4af','#86efac'
    ];

    // ══════════════════════════════
    // 상태
    // ══════════════════════════════
    let scene, camera, renderer, raycaster, mouse;
    let buildingMeshGroups = []; // [{data, meshes:[]}]
    let rings = [], labelSprites = [];
    let showLabels = true, showRings = true;
    let mapData = null;
    let hiddenFields = new Set();

    let isDragging = false, isRightDragging = false;
    let lastMouse = {x:0,y:0};
    let spherical = {theta:Math.PI/6, phi:Math.PI/3, radius:1800};
    let target = {x:0, y:0, z:0};
    let selectedGroup = null;

    function fmtBudget(v) {
        if (v>=1000000) return (v/1000000).toFixed(2)+'조원';
        if (v>=100000) return (v/100000).toFixed(1)+'천억원';
        if (v>=10000) return (v/100).toFixed(0)+'억원';
        if (v>=100) return (v/100).toFixed(1)+'억원';
        return Math.round(v).toLocaleString()+'백만원';
    }

    // 건물 전체 높이: 로그 스케일 (단위: 백만원)
    function calcHeight(bud) {
        return Math.max(6, Math.log(1 + bud / 300) * 28);
    }

    // ══════════════════════════════
    // Three.js 초기화
    // ══════════════════════════════
    function initThree() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d1117);
        scene.fog = new THREE.Fog(0x0d1117, 1200, 3200);

        const w = window.innerWidth, h = window.innerHeight;
        camera = new THREE.PerspectiveCamera(50, w/h, 1, 6000);
        updateCamera();

        renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 조명
        scene.add(new THREE.AmbientLight(0x1e3050, 3.2));
        const sun = new THREE.DirectionalLight(0xffffff, 2.8);
        sun.position.set(800, 1500, 600);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.near = 1; sun.shadow.camera.far = 5000;
        sun.shadow.camera.left = -2500; sun.shadow.camera.right = 2500;
        sun.shadow.camera.top = 2500; sun.shadow.camera.bottom = -2500;
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x4080ff, 1.0);
        fill.position.set(-600, 600, -600);
        scene.add(fill);

        // 바닥
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(9000, 9000),
            new THREE.MeshLambertMaterial({color:0x161b22})
        );
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);
        const grid = new THREE.GridHelper(7000, 70, 0x21262d, 0x21262d);
        grid.position.y = 0.5;
        scene.add(grid);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        setupControls();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function updateCamera() {
        const {theta, phi, radius} = spherical;
        camera.position.set(
            target.x + radius * Math.sin(phi) * Math.sin(theta),
            target.y + radius * Math.cos(phi),
            target.z + radius * Math.sin(phi) * Math.cos(theta)
        );
        camera.lookAt(target.x, target.y, target.z);
    }

    // ══════════════════════════════
    // 컨트롤
    // ══════════════════════════════
    function setupControls() {
        const el = renderer.domElement;
        el.addEventListener('mousedown', e => {
            if (e.button===2) isRightDragging=true; else isDragging=true;
            lastMouse={x:e.clientX, y:e.clientY};
        });
        el.addEventListener('mousemove', e => {
            const dx=e.clientX-lastMouse.x, dy=e.clientY-lastMouse.y;
            if (isDragging) {
                spherical.theta -= dx*0.005;
                spherical.phi = Math.max(0.08, Math.min(Math.PI/2-0.04, spherical.phi+dy*0.005));
                updateCamera();
            } else if (isRightDragging) {
                const s=spherical.radius/1000;
                target.x -= dx*s; target.z -= dy*s;
                updateCamera();
            }
            lastMouse={x:e.clientX, y:e.clientY};
            updateTooltip(e);
        });
        window.addEventListener('mouseup', ()=>{isDragging=false; isRightDragging=false;});
        el.addEventListener('wheel', e=>{
            spherical.radius = Math.max(80, Math.min(3200, spherical.radius+e.deltaY*0.8));
            updateCamera();
        });
        el.addEventListener('click', e=>handleClick(e));
        el.addEventListener('contextmenu', e=>e.preventDefault());

        // 터치
        let lastTouches=[];
        el.addEventListener('touchstart', e=>{lastTouches=[...e.touches];});
        el.addEventListener('touchmove', e=>{
            e.preventDefault();
            if (e.touches.length===1) {
                spherical.theta -= (e.touches[0].clientX-lastTouches[0].clientX)*0.005;
                spherical.phi = Math.max(0.08, Math.min(Math.PI/2-0.04, spherical.phi+(e.touches[0].clientY-lastTouches[0].clientY)*0.005));
                updateCamera();
            } else if (e.touches.length===2) {
                const d0=Math.hypot(lastTouches[0].clientX-lastTouches[1].clientX, lastTouches[0].clientY-lastTouches[1].clientY);
                const d1=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
                spherical.radius = Math.max(80, Math.min(3200, spherical.radius*(d0/d1)));
                updateCamera();
            }
            lastTouches=[...e.touches];
        },{passive:false});
    }

    // ══════════════════════════════
    // 다층 건물 생성
    // ══════════════════════════════
    function createBuildings() {
        mapData.buildings.forEach(b => {
            const totalHeight = calcHeight(b.bud);
            const floors = b.bl.length > 0 ? b.bl : [{name:b.name, bud:b.bud}];
            const totalFloorBud = floors.reduce((s,f)=>s+f.bud, 0);
            const bs = Math.max(3.5, Math.min(40, (b.bud/800)**0.38));

            // 각 세부사업 층을 쌓음
            let yOffset = 0;
            const meshes = [];
            floors.forEach((floor, fi) => {
                const floorH = totalFloorBud > 0
                    ? Math.max(1, (floor.bud / totalFloorBud) * totalHeight)
                    : totalHeight / floors.length;
                const colorInt = FLOOR_PALETTE_INT[fi % FLOOR_PALETTE_INT.length];

                const geo = new THREE.BoxGeometry(bs, floorH, bs);
                const mat = new THREE.MeshLambertMaterial({color:colorInt, transparent:true, opacity:0.88});
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(b.x, yOffset + floorH/2, b.z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                // 건물 데이터를 모든 층 mesh에 저장
                mesh.userData = {building:b, floorIdx:fi, floorName:floor.name, floorBud:floor.bud};
                scene.add(mesh);
                meshes.push(mesh);
                yOffset += floorH;

                // 층 경계선 (얇은 선)
                if (fi < floors.length-1 && floorH > 2) {
                    const lineGeo = new THREE.BoxGeometry(bs+0.3, 0.6, bs+0.3);
                    const lineMat = new THREE.MeshBasicMaterial({color:0x0d1117, transparent:true, opacity:0.5});
                    const line = new THREE.Mesh(lineGeo, lineMat);
                    line.position.set(b.x, yOffset, b.z);
                    scene.add(line);
                }
            });

            // 옥상 하이라이트 (분야 색)
            const roofColor = FIELD_COLORS_INT[b.field] || 0x6b7280;
            const roof = new THREE.Mesh(
                new THREE.BoxGeometry(bs+0.5, 1.2, bs+0.5),
                new THREE.MeshLambertMaterial({color:roofColor, transparent:true, opacity:0.95})
            );
            roof.position.set(b.x, yOffset+0.6, b.z);
            roof.userData = {building:b, floorIdx:-1, floorName:'옥상', floorBud:b.bud};
            scene.add(roof);
            meshes.push(roof);

            buildingMeshGroups.push({data:b, meshes});
        });
    }

    // ══════════════════════════════
    // 분야 구역 링 + 라벨
    // ══════════════════════════════
    function createRings() {
        mapData.groups.forEach(g => {
            const color = FIELD_COLORS_INT[g.name] || 0x6b7280;
            const r = g.radius + 22;

            const ring = new THREE.Mesh(
                new THREE.RingGeometry(r-3, r, 64),
                new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.22, side:THREE.DoubleSide})
            );
            ring.rotation.x = -Math.PI/2;
            ring.position.set(g.cx, 1.5, g.cz);
            scene.add(ring);
            rings.push(ring);

            // 바닥 원 채우기 (매우 투명)
            const floor = new THREE.Mesh(
                new THREE.CircleGeometry(r, 64),
                new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.05, side:THREE.DoubleSide})
            );
            floor.rotation.x = -Math.PI/2;
            floor.position.set(g.cx, 1, g.cz);
            scene.add(floor);
            rings.push(floor);

            // 스프라이트 라벨
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,512,100);
            ctx.font = 'bold 28px "Noto Sans KR", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 6;
            ctx.fillText(g.name, 256, 50);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(canvas), transparent:true, opacity:0.92}));
            sprite.position.set(g.cx, 35, g.cz - r - 8);
            sprite.scale.set(180, 36, 1);
            scene.add(sprite);
            labelSprites.push(sprite);
        });
    }

    // ══════════════════════════════
    // 토글
    // ══════════════════════════════
    function toggleLabels() {
        showLabels = !showLabels;
        document.getElementById('btn-labels').classList.toggle('active', showLabels);
        labelSprites.forEach(s => s.visible=showLabels);
    }
    function toggleRings() {
        showRings = !showRings;
        document.getElementById('btn-rings').classList.toggle('active', showRings);
        rings.forEach(r => r.visible=showRings);
    }
    function resetCamera() {
        spherical={theta:Math.PI/6, phi:Math.PI/3, radius:1800};
        target={x:0,y:0,z:0};
        updateCamera();
    }
    function toggleField(fieldName) {
        if (hiddenFields.has(fieldName)) hiddenFields.delete(fieldName);
        else hiddenFields.add(fieldName);
        const hidden = hiddenFields.has(fieldName);
        buildingMeshGroups.forEach(g => {
            if (g.data.field===fieldName) g.meshes.forEach(m=>m.visible=!hidden);
        });
        document.querySelectorAll('.legend-item').forEach(el=>{
            if (el.dataset.field===fieldName) el.classList.toggle('hidden', hidden);
        });
    }

    // ══════════════════════════════
    // 레이캐스트
    // ══════════════════════════════
    function getRaycastHit(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
        mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
        raycaster.setFromCamera(mouse, camera);
        const allMeshes = [];
        buildingMeshGroups.forEach(g => { if (!hiddenFields.has(g.data.field)) g.meshes.forEach(m=>{if(m.visible)allMeshes.push(m);}); });
        const hits = raycaster.intersectObjects(allMeshes);
        return hits.length ? hits[0] : null;
    }

    function updateTooltip(e) {
        const hit = getRaycastHit(e);
        const tt = document.getElementById('tooltip');
        if (!hit) { tt.style.display='none'; return; }
        const {building, floorIdx, floorName, floorBud} = hit.object.userData;
        if (!building) { tt.style.display='none'; return; }
        const fc = FIELD_COLORS_HEX[building.field]||'#6b7280';
        let floorInfo = '';
        if (floorIdx >= 0) {
            const fc2 = FLOOR_PALETTE_HEX[floorIdx%FLOOR_PALETTE_HEX.length];
            floorInfo = `<div class="tt-floor"><span style="color:${fc2}">■</span> 세부사업: ${floorName} (${fmtBudget(floorBud)})</div>`;
        }
        tt.style.display='block';
        tt.style.left=(e.clientX+16)+'px';
        tt.style.top=(Math.min(e.clientY-10, window.innerHeight-160))+'px';
        tt.innerHTML = `
            <div class="tt-name">${building.name}</div>
            <div class="tt-budget">${fmtBudget(building.bud)}</div>
            <div class="tt-row"><span>소관부처</span><span class="tt-val">${building.min}</span></div>
            <div class="tt-row"><span>분야</span><span class="tt-val" style="color:${fc}">${building.field}</span></div>
            <div class="tt-row"><span>세부사업 수</span><span class="tt-val">${building.bl.length}개 층</span></div>
            ${floorInfo}`;
    }

    function handleClick(e) {
        const hit = getRaycastHit(e);
        if (!hit) { closeInfo(); return; }
        const {building} = hit.object.userData;
        if (!building) return;
        const fc = FIELD_COLORS_HEX[building.field]||'#6b7280';
        const floors = building.bl.length>0 ? building.bl : [{name:building.name, bud:building.bud}];
        const floorsHtml = floors.map((f,i)=>{
            const fc2 = FLOOR_PALETTE_HEX[i%FLOOR_PALETTE_HEX.length];
            return `<div class="ip-floor-item">
                <div class="ip-floor-dot" style="background:${fc2}"></div>
                <div class="ip-floor-name">${f.name}</div>
                <div class="ip-floor-bud">${fmtBudget(f.bud)}</div>
            </div>`;
        }).join('');
        document.getElementById('ip-content').innerHTML = `
            <div class="ip-title">${building.name}</div>
            <div class="ip-budget">${fmtBudget(building.bud)}</div>
            <div class="ip-row"><span>소관부처</span><span class="ip-val">${building.min}</span></div>
            <div class="ip-row"><span>분야</span><span class="ip-val" style="color:${fc}">${building.field}</span></div>
            <div class="ip-row"><span>부문</span><span class="ip-val">${building.subfield||''}</span></div>
            <div class="ip-row"><span>세부사업(층) 수</span><span class="ip-val">${floors.length}개</span></div>
            ${floors.length>0?`<div style="margin-top:8px;font-size:10px;color:#6e7681;margin-bottom:2px">층별 세부사업 (아래→위)</div><div class="ip-floors">${floorsHtml}</div>`:''}`;
        document.getElementById('info-panel').style.display='block';

        // 선택 강조
        buildingMeshGroups.forEach(g=>{
            g.meshes.forEach(m=>{
                m.material.emissive = new THREE.Color(0x000000);
                m.material.emissiveIntensity = 0;
            });
        });
        const grp = buildingMeshGroups.find(g=>g.data===building);
        if (grp) grp.meshes.forEach(m=>{ m.material.emissive=new THREE.Color(0xffffff); m.material.emissiveIntensity=0.25; });
    }

    function closeInfo() {
        document.getElementById('info-panel').style.display='none';
        buildingMeshGroups.forEach(g=>{
            g.meshes.forEach(m=>{ m.material.emissive=new THREE.Color(0x000000); m.material.emissiveIntensity=0; });
        });
    }

    // ══════════════════════════════
    // 범례
    // ══════════════════════════════
    function buildLegend() {
        const list = document.getElementById('legend-list');
        mapData.groups.forEach(g=>{
            const fc = FIELD_COLORS_HEX[g.name]||'#6b7280';
            const item = document.createElement('div');
            item.className='legend-item'; item.dataset.field=g.name;
            item.onclick=()=>toggleField(g.name);
            item.innerHTML=`<div class="legend-dot" style="background:${fc}"></div>
                <div class="legend-name">${g.name}</div>
                <div class="legend-meta">${g.count}</div>`;
            list.appendChild(item);
        });
    }

    // ══════════════════════════════
    // 렌더 루프
    // ══════════════════════════════
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    // ══════════════════════════════
    // 초기화
    // ══════════════════════════════
    async function init() {
        const res = await fetch('map3d.json');
        mapData = await res.json();

        const totalBudget = mapData.buildings.reduce((s,b)=>s+b.bud, 0);
        const totalSub = mapData.buildings.reduce((s,b)=>s+b.bl.length, 0);
        document.getElementById('h-budget').textContent = (totalBudget/1000000).toFixed(1);
        document.getElementById('h-bldg').textContent = mapData.buildings.length.toLocaleString();
        document.getElementById('h-sub').textContent = totalSub.toLocaleString();

        initThree();
        createBuildings();
        createRings();
        buildLegend();
        animate();
        document.getElementById('loading').style.display='none';
    }

    init().catch(console.error);
    </script>
</body>
